name: loan-risk-env
version: 0.1.0
description: Loan approval RL environment

entrypoint: env.loan_env:LoanEnv

tasks:
  - name: easy
  - name: medium
  - name: hard

action_space:
  type: enum
  values:
    - approve
    - reject

observation_space:
  type: object
  properties:
    income_stability:
      type: string
    credit_history:
      type: string
    employment_type:
      type: string
    loan_amount:
      type: integer
